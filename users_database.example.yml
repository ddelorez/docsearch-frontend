# Authelia users database — copy to users_database.yml and edit as needed.
#
# For production with Active Directory, this file can remain empty;
# Authelia will use LDAP as the authentication backend instead.
#
# For development/demo, Authelia requires at least one user to be defined.
# Default credentials (for docker-compose auto-creation):
#   Username: helpdesk
#   Password: StarTech.com!
#
# To add a local user, generate an Argon2 password hash:
#   python -c "from argon2 import PasswordHasher; ph = PasswordHasher(); print(ph.hash('YOUR_PASSWORD'))"
# Then add the user block below.
---
users:
  CHANGE_ME_USERNAME:
    disabled: false
    displayname: 'CHANGE_ME - Set your display name'
    password: 'CHANGE_ME_GENERATE_A_VALID_HASH'
    email: 'CHANGE_ME@example.com'
    groups:
      - 'admins'
      - 'dev'
