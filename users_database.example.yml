# Authelia file-based users database.
#
# In production with Active Directory/LDAP, this file is not needed
# (configure the ldap backend in authelia.yml instead).
#
# For local development, this file is generated automatically by:
#   ./scripts/generate-secrets.sh
#
# The generator creates a single dev user with random password and stores
# the credentials in your .env file (AUTHELIA_DEV_USERNAME, AUTHELIA_DEV_PASSWORD)
# for convenience. The actual password hash uses Argon2id with the same
# parameters as configured in authelia.yml (memory=65536, iterations=3, parallelism=4).
#
# If you need to create this file manually, use the following template.
# Replace all CHANGE_ME values with your actual user data.
---
users:
  CHANGE_ME_USERNAME:
    disabled: false
    displayname: 'CHANGE_ME - Set your display name'
    password: 'CHANGE_ME_GENERATE_A_VALID_HASH'
    email: 'CHANGE_ME@example.com'
    groups:
      - 'dev'
      - 'admins'
