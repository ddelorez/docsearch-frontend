name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet ruff==0.8.4

      - name: ruff check
        run: .venv/bin/ruff check app/ tests/

      - name: ruff format check
        run: .venv/bin/ruff format --check app/ tests/

  # ── 2. Type check ─────────────────────────────────────────────────────────
  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt

      - name: mypy
        run: |
          .venv/bin/mypy app/ \
            --ignore-missing-imports \
            --warn-unused-ignores \
            --python-version 3.12

  # ── 3. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    env:
      # Minimal env for testing without real Keycloak
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: test
      KEYCLOAK_CLIENT_ID: test-client
      KEYCLOAK_CLIENT_SECRET: test-secret
      RAG_SERVICE_URL: http://localhost:9000
      SECRET_KEY: test-secret-key-not-for-production
      ALLOWED_AD_GROUPS: ""
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt

      - name: Run tests with coverage
        run: |
          .venv/bin/pytest tests/ \
            --asyncio-mode=auto \
            --tb=short \
            -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        if: always()

  # ── 4. Docker build ────────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: docsearch-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
