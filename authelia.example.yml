---
server:
  address: tcp://0.0.0.0:9091/

log:
  level: info
  format: text

storage:
  encryption_key: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
  local:
    path: /var/lib/authelia

identity_validation:
  reset_password:
    jwt_secret: ${RESET_PASSWORD_JWT_SECRET}

session:
  name: authelia_session
  same_site: lax
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - domain: ${AUTHELIA_SESSION_DOMAIN:${AUTH_COOKIE_DOMAIN}}
      authelia_url: https://${AUTH_COOKIE_DOMAIN}/authelia/
      default_redirection_url: https://${AUTH_COOKIE_DOMAIN}/

access_control:
  default_policy: deny
  rules:
    - domain: "*"
      policy: one_factor

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2
      iterations: 3
      memory: 65536
      parallelism: 4
      key_length: 32
      salt_length: 16

identity_providers:
  oidc:
    hmac_secret: ${OIDC_HMAC_SECRET}
    jwks:
      - key: |
          __RSA_KEY_PLACEHOLDER__
    enable_client_debug_messages: true
    clients:
      - client_id: ${OIDC_CLIENT_ID}
        client_name: "DocSearch Frontend"
        client_secret: ${OIDC_CLIENT_SECRET_HASH}
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - "https://${AUTH_COOKIE_DOMAIN}/auth/callback"
          - "http://localhost:8000/auth/callback"
        scopes:
          - openid
          - offline_access
          - profile
          - email
          - groups
        grant_types:
          - authorization_code
          - refresh_token
        response_types:
          - code
        token_endpoint_auth_method: client_secret_basic

notifier:
  disable_startup_check: true
  filesystem:
    filename: /var/lib/authelia/notification.txt
