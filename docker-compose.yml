services:
  # ── FastAPI Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docsearch-frontend
    restart: unless-stopped
    env_file: .env
    # Volumes - uncomment source mount for dev live reload
    volumes: []
    expose:
      - "8000"
    networks:
      - internal
    depends_on:
      authelia:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    # Environment overrides (in addition to .env):
    environment:
      # Internal Docker URL for server-to-server OIDC discovery.
      # Uses HTTP to avoid SSL certificate issues with self-signed Authelia certs.
      - AUTHELIA_INTERNAL_URL=http://authelia:9091

  # ── Authelia Identity Provider ──────────────────────────────────────────────
  authelia:
    image: authelia/authelia:latest
    container_name: docsearch-authelia
    restart: unless-stopped
    # No env_file — all config values are embedded in authelia.yml directly.
    # Authelia treats AUTHELIA_* env vars as config overrides which causes
    # "configuration environment variable not expected" warnings.
    volumes:
      # Named volume persists users_database.yml and other config data
      # across stack rebuilds (docker compose down && up --build).
      - authelia-config:/config
      # Overlay configuration.yml from the repo (read-only).
      - ./authelia.yml:/config/configuration.yml:ro
      - authelia-data:/var/lib/authelia
    # Ensure users_database.yml exists before Authelia starts.
    # Authelia requires this file; on first run (or after a volume prune)
    # we create an empty template so the service can boot.
    entrypoint:
      - sh
      - -c
      - |
        if [ ! -f /config/users_database.yml ]; then
          printf '---\\nusers: {}\\n' > /config/users_database.yml
        fi
        exec authelia --config /config/configuration.yml
    expose:
      - "9091"
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Redis for Authelia ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: docsearch-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: docsearch-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount TLS certs for production (generate self-signed for dev, see README)
      - ./certs:/etc/nginx/certs:ro
      # Static files are baked into the Docker image; no host mount needed
    networks:
      - internal
    depends_on:
      - frontend
      - authelia

volumes:
  redis-data:
  authelia-data:
  authelia-config:

networks:
  internal:
    driver: bridge
