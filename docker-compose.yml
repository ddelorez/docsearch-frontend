services:
  # ── FastAPI Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docsearch-frontend
    restart: unless-stopped
    env_file: .env
    # Volumes - uncomment source mount for dev live reload
    volumes: []
    expose:
      - "8000"
    networks:
      - internal
    depends_on:
      authelia:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Authelia Identity Provider ──────────────────────────────────────────────
  authelia:
    image: authelia/authelia:latest
    container_name: docsearch-authelia
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./authelia.yml:/config/configuration.yml:ro
      - ./users_database.yml:/config/users_database.yml:ro
      - authelia-data:/var/lib/authelia
    expose:
      - "9091"
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Redis for Authelia ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: docsearch-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: docsearch-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount TLS certs for production (generate self-signed for dev, see README)
      - ./certs:/etc/nginx/certs:ro
      # Static files are baked into the Docker image; no host mount needed
    networks:
      - internal
    depends_on:
      - frontend
      - authelia

volumes:
  redis-data:
  authelia-data:

networks:
  internal:
    driver: bridge
