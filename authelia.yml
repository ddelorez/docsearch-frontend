---
server:
  host: 0.0.0.0
  port: 9091
  path: ""

log:
  level: info
  format: text

storage:
  redis:
    host: redis
    port: 6379
    database_index: 0
    max_retries: 3

session:
  name: authelia_session
  domain: localhost
  secret: ${SESSION_SECRET}
  expiration: 1h
  inactivity: 5m
  remember_me: 1M

# ── Default: file-based users (for development) ───────────────────────────────
# For production with Active Directory, replace this entire section with the
# `authentication_backend.ldap` block at the bottom of this file.
authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2
    # Reset the password field for a user after they log in and change their
    # password so that the new hash is stored in the database.
    password_reset: false

access_control:
  default_policy: deny
  rules:
    - domain: "*"
      policy: one_factor

identity_providers:
  oidc:
    hmac_secret: ${OIDC_HMAC_SECRET}
    issuer_private_key: |
      ${OIDC_ISSUER_PRIVATE_KEY}
    clients:
      - client_id: ${OIDC_CLIENT_ID}
        client_name: "DocSearch Frontend"
        client_secret: ${OIDC_CLIENT_SECRET_HASH}
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - "https://localhost/auth/callback"
          - "http://localhost:8000/auth/callback"
        scopes:
          - openid
          - profile
          - email
          - groups
        grant_types:
          - authorization_code
          - refresh_token
        response_types:
          - code
        token_endpoint_auth_method: client_secret_basic

# Uncomment for Active Directory/LDAP integration:
